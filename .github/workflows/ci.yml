name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go vet
        run: go vet ./...

      - name: Unit tests (race detector)
        run: go test -race -count=1 ./...

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    if: ${{ secrets.HN_TEST_USER != '' }}
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Integration tests
        env:
          HN_TEST_USER: ${{ secrets.HN_TEST_USER }}
          HN_TEST_PASS: ${{ secrets.HN_TEST_PASS }}
        run: go test -tags integration -race -count=1 -timeout 120s -v ./...
